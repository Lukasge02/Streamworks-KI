services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: streamworks
      POSTGRES_USER: ${POSTGRES_USER:-streamworks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-streamworks123}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-streamworks}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:v1.13.2
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-streamworks}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-streamworks123}
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  backend:
    build: ./backend
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-streamworks}:${POSTGRES_PASSWORD:-streamworks123}@postgres:5432/streamworks
      - QDRANT_URL=http://qdrant:6333
      - MINIO_ENDPOINT=minio:9000
      - ENVIRONMENT=production
      - CORS_ORIGINS=http://localhost,http://159.195.20.23
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      args:
        # Leer = relative URLs (/api/...) -- Nginx proxied alles
        NEXT_PUBLIC_BACKEND_URL: ""
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./.htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
  minio_data:
