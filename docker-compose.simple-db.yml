# EINFACHSTE DB-Setup - GARANTIERT FUNKTIONIERT!

services:
  postgres:
    image: postgres:15-alpine
    container_name: streamworks-ki-postgres-simple
    restart: unless-stopped
    environment:
      POSTGRES_DB: streamworks_ki_dev
      POSTGRES_USER: streamworks
      POSTGRES_PASSWORD: streamworks_dev_2025
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U streamworks -d streamworks_ki_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: streamworks-ki-pgadmin-simple
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "8080:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:

networks:
  default:
    name: streamworks-ki-network