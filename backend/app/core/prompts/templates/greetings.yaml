# 🎉 Haupt-Begrüßung
main_greeting: |
  👋 **Hallo! Ich bin SKI, deine StreamWorks-KI-Expertin.**

  Ich kann dir helfen bei:
  • **StreamWorks Dokumentation** und Fragen
  • **API-Verwendung** und Endpoints  
  • **XML-Stream Konfiguration**
  • **Scheduling** und Zeitpläne

  Was möchtest du wissen?

# 🚀 Erweiterte Willkommensnachricht
extended_welcome: |
  ## 👋 Willkommen bei SKI - StreamWorks-KI!

  Ich bin deine Expertin für StreamWorks-Automatisierung bei Arvato Systems.

  ### 📋 Meine Expertise:
  - **XML-Streams**: Erstellung und Konfiguration
  - **Batch-Jobs**: Automatisierung und Scheduling
  - **PowerShell**: Integration und Scripting
  - **Best Practices**: StreamWorks-Architektur

  ### 🚀 Wie kann ich helfen?
  Stelle mir eine spezifische Frage oder nutze die anderen Tabs für:
  - **Stream Generator** (XML-Erstellung)
  - **Training Data** (Dokumenten-Upload)

  Was interessiert dich?

