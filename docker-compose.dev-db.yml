# StreamWorks-KI - Nur Datenbank-Services für Development
# Optimiert für lokale Entwicklung mit Docker-DB

services:
  # PostgreSQL Development Database
  postgres:
    image: postgres:15-alpine
    container_name: streamworks-ki-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: streamworks_ki_dev
      POSTGRES_USER: streamworks
      POSTGRES_PASSWORD: streamworks_dev_2025
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
      - ./database/dev-setup.sql:/docker-entrypoint-initdb.d/99-dev-setup.sql
    command: |
      postgres 
      -c shared_preload_libraries=pg_stat_statements
      -c pg_stat_statements.track=all
      -c max_connections=200
      -c shared_buffers=128MB
      -c effective_cache_size=512MB
      -c maintenance_work_mem=32MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=8MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=2MB
      -c log_statement=all
      -c log_duration=on
      -c log_min_duration_statement=100
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U streamworks -d streamworks_ki_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # pgAdmin Web Interface
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: streamworks-ki-pgadmin-dev
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: dev@streamworks-ki.local
      PGADMIN_DEFAULT_PASSWORD: dev_admin_2025
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "8080:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_dev_data:/var/lib/pgladmin
      - ./database/pgadmin-servers.json:/pgadmin4/servers.json:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/misc/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Redis für Caching (optional, aber nützlich)
  redis:
    image: redis:7-alpine
    container_name: streamworks-ki-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_dev_data:
    driver: local
  pgadmin_dev_data:
    driver: local
  redis_dev_data:
    driver: local

networks:
  default:
    name: streamworks-ki-dev-network
    driver: bridge